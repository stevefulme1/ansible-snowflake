---
# Integration tests for stevefulme1.snowflake.schema
# These tests require a live Snowflake account.
# Set environment variables: SNOWFLAKE_ACCOUNT, SNOWFLAKE_USER, SNOWFLAKE_PRIVATE_KEY

- name: Set test resource name
  ansible.builtin.set_fact:
    test_schema_name: "ANSIBLE_TEST_{{ lookup('password', '/dev/null chars=ascii_uppercase length=6') }}"

- name: Create schema
  stevefulme1.snowflake.schema:
    name: "{{ test_schema_name }}"
    database: "{{ snowflake_test_database | default('SNOWFLAKE') }}"
    account: "{{ snowflake_account }}"
    user: "{{ snowflake_user }}"
    private_key: "{{ snowflake_private_key }}"
  register: result

- name: Verify creation
  ansible.builtin.assert:
    that:
      - result is changed

- name: Delete schema
  stevefulme1.snowflake.schema:
    name: "{{ test_schema_name }}"
    database: "{{ snowflake_test_database | default('SNOWFLAKE') }}"
    state: absent
    account: "{{ snowflake_account }}"
    user: "{{ snowflake_user }}"
    private_key: "{{ snowflake_private_key }}"
  register: result

- name: Verify deletion
  ansible.builtin.assert:
    that:
      - result is changed
