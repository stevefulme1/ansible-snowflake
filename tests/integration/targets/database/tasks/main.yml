---
# Integration tests for stevefulme1.snowflake.database
# These tests require a live Snowflake account.
# Set environment variables: SNOWFLAKE_ACCOUNT, SNOWFLAKE_USER, SNOWFLAKE_PRIVATE_KEY

- name: Set test resource name
  ansible.builtin.set_fact:
    test_database_name: "ANSIBLE_TEST_{{ lookup('password', '/dev/null chars=ascii_uppercase length=6') }}"

- name: Create database
  stevefulme1.snowflake.database:
    name: "{{ test_database_name }}"
    data_retention_time_in_days: 1
    account: "{{ snowflake_account }}"
    user: "{{ snowflake_user }}"
    private_key: "{{ snowflake_private_key }}"
  register: result

- name: Verify creation
  ansible.builtin.assert:
    that:
      - result is changed

- name: Delete database
  stevefulme1.snowflake.database:
    name: "{{ test_database_name }}"
    state: absent
    account: "{{ snowflake_account }}"
    user: "{{ snowflake_user }}"
    private_key: "{{ snowflake_private_key }}"
  register: result

- name: Verify deletion
  ansible.builtin.assert:
    that:
      - result is changed
