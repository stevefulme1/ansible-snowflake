---
# Integration tests for stevefulme1.snowflake.user
# These tests require a live Snowflake account.
# Set environment variables: SNOWFLAKE_ACCOUNT, SNOWFLAKE_USER, SNOWFLAKE_PRIVATE_KEY

- name: Set test resource name
  ansible.builtin.set_fact:
    test_user_name: "ANSIBLE_TEST_{{ lookup('password', '/dev/null chars=ascii_uppercase length=6') }}"

- name: Create user (check mode)
  stevefulme1.snowflake.user:
    name: "{{ test_user_name }}"
    email: "test@example.com"
    account: "{{ snowflake_account }}"
    user: "{{ snowflake_user }}"
    private_key: "{{ snowflake_private_key }}"
  check_mode: true
  register: result

- name: Verify check mode result
  ansible.builtin.assert:
    that:
      - result is changed
      - "'CREATE USER' in result.sql"

- name: Create user
  stevefulme1.snowflake.user:
    name: "{{ test_user_name }}"
    email: "test@example.com"
    account: "{{ snowflake_account }}"
    user: "{{ snowflake_user }}"
    private_key: "{{ snowflake_private_key }}"
  register: result

- name: Verify creation
  ansible.builtin.assert:
    that:
      - result is changed
      - result.user == test_user_name

- name: Create user again (idempotency)
  stevefulme1.snowflake.user:
    name: "{{ test_user_name }}"
    email: "test@example.com"
    account: "{{ snowflake_account }}"
    user: "{{ snowflake_user }}"
    private_key: "{{ snowflake_private_key }}"
  register: result

- name: Delete user
  stevefulme1.snowflake.user:
    name: "{{ test_user_name }}"
    state: absent
    account: "{{ snowflake_account }}"
    user: "{{ snowflake_user }}"
    private_key: "{{ snowflake_private_key }}"
  register: result

- name: Verify deletion
  ansible.builtin.assert:
    that:
      - result is changed

- name: Delete user again (idempotency)
  stevefulme1.snowflake.user:
    name: "{{ test_user_name }}"
    state: absent
    account: "{{ snowflake_account }}"
    user: "{{ snowflake_user }}"
    private_key: "{{ snowflake_private_key }}"
  register: result

- name: Verify no change
  ansible.builtin.assert:
    that:
      - result is not changed
