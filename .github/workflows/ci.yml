---
name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install ansible-core ansible-lint
      - run: ansible-lint

  sanity:
    name: Sanity (Ansible ${{ matrix.ansible }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        ansible: ['2.16', '2.17']
    steps:
      - uses: actions/checkout@v4
        with:
          path: ansible_collections/stevefulme1/snowflake
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install ansible-core~=${{ matrix.ansible }}.0
      - run: ansible-test sanity --docker -v --color
        working-directory: ansible_collections/stevefulme1/snowflake

  auto-merge:
    name: Auto-merge (owner)
    needs: [lint, sanity]
    runs-on: ubuntu-latest
    if: github.actor == 'stevefulme1' && github.event_name == 'pull_request'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - run: gh pr merge --auto --squash "${{ github.event.pull_request.number }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
