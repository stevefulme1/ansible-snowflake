---
name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install ruff ansible-core ansible-lint
      - run: ruff check .
      - run: ruff format --check .
      - run: ansible-lint

  sanity:
    name: Sanity (Ansible ${{ matrix.ansible }} / py${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - ansible: '2.16'
            python: '3.12'
          - ansible: '2.17'
            python: '3.12'
          - ansible: '2.18'
            python: '3.12'
          - ansible: '2.18'
            python: '3.13'
          - ansible: '2.20'
            python: '3.12'
          - ansible: '2.20'
            python: '3.13'
    steps:
      - uses: actions/checkout@v4
        with:
          path: ansible_collections/stevefulme1/snowflake
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - run: pip install ansible-core~=${{ matrix.ansible }}.0
      - run: ansible-test sanity --python ${{ matrix.python }} -v --color yes
        working-directory: ansible_collections/stevefulme1/snowflake

  unit:
    name: Unit tests (py${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ['3.12', '3.13']
    steps:
      - uses: actions/checkout@v4
        with:
          path: ansible_collections/stevefulme1/snowflake
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - run: pip install ansible-core pytest
      - name: Run unit tests
        working-directory: ansible_collections/stevefulme1/snowflake
        run: python -m pytest tests/unit/ -v --tb=short
        env:
          PYTHONPATH: ${{ github.workspace }}

  integration:
    name: Integration (mock)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          path: ansible_collections/stevefulme1/snowflake
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install ansible-core
      - run: >-
          ansible-test integration --python 3.12 -v --color yes 2>&1 || true
        working-directory: ansible_collections/stevefulme1/snowflake

  auto-merge:
    name: Auto-merge (owner)
    needs: [lint, sanity, unit]
    runs-on: ubuntu-latest
    if: github.actor == 'stevefulme1' && github.event_name == 'pull_request'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: hmarr/auto-approve-action@v4
      - uses: actions/checkout@v4
      - run: gh pr merge --auto --squash "${{ github.event.pull_request.number }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
